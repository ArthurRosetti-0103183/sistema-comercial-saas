{% extends "base.html" %}
{% block content %}
<h2 class="mb-4 fw-bold">
    <a href="{{ url_for('clientes.index') }}" class="text-decoration-none text-muted"><i class="fas fa-arrow-left"></i></a>
    {% if cliente %}Editar Cliente{% else %}Novo Cliente{% endif %}
</h2>

<div class="card shadow-sm">
    <div class="card-body p-4">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-medium">Nome Completo *</label>
                <input type="text" name="nome" class="form-control" required value="{{ cliente.nome if cliente else '' }}">
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-medium">CPF / CNPJ</label>
                    <input type="text" name="cpf_cnpj" class="form-control" value="{{ cliente.cpf_cnpj if cliente else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-medium">Telefone</label>
                    <input type="text" name="telefone" class="form-control" value="{{ cliente.telefone if cliente else '' }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-medium">Email</label>
                <input type="email" name="email" class="form-control" value="{{ cliente.email if cliente else '' }}">
            </div>
            <div class="mb-4">
                <label class="form-label fw-medium">Endereço Completo</label>
                <textarea name="endereco" class="form-control" rows="2">{{ cliente.endereco if cliente else '' }}</textarea>
            </div>
            
            <div class="d-flex justify-content-end gap-2">
                <a href="{{ url_for('clientes.index') }}" class="btn btn-light border">Cancelar</a>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
