{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold"><i class="fas fa-users text-primary"></i> Clientes</h2>
    <a href="{{ url_for('clientes.novo') }}" class="btn btn-primary"><i class="fas fa-plus"></i> Novo Cliente</a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>CPF/CNPJ</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th class="text-end">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for c in clientes %}
                    <tr>
                        <td>#{{ c.id }}</td>
                        <td class="fw-medium">{{ c.nome }}</td>
                        <td>{{ c.cpf_cnpj or '-' }}</td>
                        <td>{{ c.telefone or '-' }}</td>
                        <td>{{ c.email or '-' }}</td>
                        <td class="text-end">
                            <a href="{{ url_for('clientes.editar', id=c.id) }}" class="btn btn-sm btn-outline-primary"><i class="fas fa-edit"></i></a>
                            <form action="{{ url_for('clientes.excluir', id=c.id) }}" method="POST" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Excluir cliente?')"><i class="fas fa-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="6" class="text-center text-muted py-4">Nenhum cliente cadastrado.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
