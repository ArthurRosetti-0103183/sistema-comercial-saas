{% extends "base.html" %}
{% block content %}
<h2 class="mb-4 fw-bold">
    <a href="{{ url_for('vendas.index') }}" class="text-decoration-none text-muted"><i class="fas fa-arrow-left"></i></a>
    Ponto de Venda (PDV)
</h2>

<div class="row">
    <!-- Seleção de Produtos -->
    <div class="col-md-8">
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white fw-bold"><i class="fas fa-box-open text-primary"></i> Selecionar Produtos</div>
            <div class="card-body">
                <div class="d-flex gap-2 mb-4">
                    <select id="produtoSelect" class="form-select border-primary" style="border-width: 2px;">
                        <option value="">-- Escolha um produto --</option>
                        {% for p in produtos %}
                        <option value="{{ p.id }}" data-preco="{{ p.preco_venda }}" data-estoque="{{ p.quantidade_estoque }}" data-nome="{{ p.nome }}">
                            {{ p.nome }} - R$ {{ "%.2f"|format(p.preco_venda) }} (Estoque: {{ p.quantidade_estoque }})
                        </option>
                        {% endfor %}
                    </select>
                    <button class="btn btn-primary px-4 fw-bold" type="button" onclick="addProduto()"><i class="fas fa-plus"></i> Inserir</button>
                </div>

                <div class="table-responsive" style="min-height: 300px;">
                    <table class="table" id="tabelaPDV">
                        <thead class="table-light">
                            <tr>
                                <th>Produto</th>
                                <th width="150">Preço Un.</th>
                                <th width="120">Qtd.</th>
                                <th width="150" class="text-end">Subtotal</th>
                                <th width="50"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Itens inseridos via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Fechamento -->
    <div class="col-md-4">
        <div class="card shadow-sm border-success border-top border-4 sticky-top" style="top: 20px;">
            <div class="card-body">
                <form method="POST" id="formVenda">
                    <input type="hidden" name="itens_json" id="itensJson">
                    
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Cliente (Opcional)</label>
                        <select name="cliente_id" class="form-select">
                            <option value="">Consumidor Final</option>
                            {% for c in clientes %}
                            <option value="{{ c.id }}">{{ c.nome }} ({{ c.cpf_cnpj or 'S/ Doc' }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="p-3 bg-light rounded mb-3">
                        <p class="text-muted mb-1 fw-bold">TOTAL DA VENDA</p>
                        <h2 class="text-success fw-bold mb-0" id="displayTotal">R$ 0,00</h2>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Valor Pago (R$)</label>
                        <input type="number" step="0.01" min="0" name="valor_pago" id="valorPago" class="form-control form-control-lg text-end fw-bold" oninput="calcularTroco()">
                    </div>

                    <div class="d-flex justify-content-between mb-4">
                        <span class="text-muted fw-bold">Troco:</span>
                        <span class="text-danger fw-bold fs-5" id="displayTroco">R$ 0,00</span>
                    </div>

                    <button type="button" class="btn btn-success btn-lg w-100 fw-bold" onclick="finalizarVenda()"><i class="fas fa-check-circle"></i> FINALIZAR VENDA</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let carrinho = [];

    function formatMoney(value) {
        return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function addProduto() {
        const select = document.getElementById('produtoSelect');
        const selected = select.options[select.selectedIndex];
        
        if(!selected.value) return;

        const id = selected.value;
        const nome = selected.dataset.nome;
        const preco = parseFloat(selected.dataset.preco);
        const maxEstoque = parseInt(selected.dataset.estoque);

        const existente = carrinho.find(i => i.produto_id === id);
        
        if(existente) {
            if(existente.quantidade < maxEstoque) {
                existente.quantidade++;
            } else {
                alert('Estoque máximo atingido para este produto!');
            }
        } else {
            carrinho.push({ produto_id: id, nome: nome, preco: preco, quantidade: 1, maxEstoque: maxEstoque });
        }
        
        renderCarrinho();
        select.value = "";
    }

    function updateQtd(index, qtd) {
        qtd = parseInt(qtd);
        if(qtd > 0 && qtd <= carrinho[index].maxEstoque) {
            carrinho[index].quantidade = qtd;
        } else {
            alert('Quantidade inválida ou superior ao estoque!');
        }
        renderCarrinho();
    }

    function removeProduto(index) {
        carrinho.splice(index, 1);
        renderCarrinho();
    }

    function renderCarrinho() {
        const tbody = document.querySelector('#tabelaPDV tbody');
        tbody.innerHTML = '';
        let total = 0;

        carrinho.forEach((item, index) => {
            const subtotal = item.preco * item.quantidade;
            total += subtotal;

            tbody.innerHTML += `
                <tr>
                    <td class="fw-medium">${item.nome}</td>
                    <td>${formatMoney(item.preco)}</td>
                    <td>
                        <input type="number" class="form-control form-control-sm" value="${item.quantidade}" 
                               min="1" max="${item.maxEstoque}" onchange="updateQtd(${index}, this.value)">
                    </td>
                    <td class="text-end fw-bold text-success">${formatMoney(subtotal)}</td>
                    <td>
                        <button class="btn btn-sm text-danger" onclick="removeProduto(${index})"><i class="fas fa-times"></i></button>
                    </td>
                </tr>
            `;
        });

        document.getElementById('displayTotal').innerText = formatMoney(total);
        document.getElementById('itensJson').value = JSON.stringify(carrinho);
        calcularTroco();
    }

    function calcularTroco() {
        const total = carrinho.reduce((sum, i) => sum + (i.preco * i.quantidade), 0);
        const pago = parseFloat(document.getElementById('valorPago').value) || 0;
        const troco = pago > total ? pago - total : 0;
        
        document.getElementById('displayTroco').innerText = formatMoney(troco);
    }

    function finalizarVenda() {
        if(carrinho.length === 0) {
            alert('Adicione produtos antes de finalizar a venda.');
            return;
        }
        
        const total = carrinho.reduce((sum, i) => sum + (i.preco * i.quantidade), 0);
        const pago = parseFloat(document.getElementById('valorPago').value);
        
        if(pago && pago < total) {
            alert('O valor pago não pode ser menor que o total da venda.');
            return;
        }

        document.getElementById('formVenda').submit();
    }
</script>
{% endblock %}
