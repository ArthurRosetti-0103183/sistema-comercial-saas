{% extends "base.html" %}
{% block content %}
<h2 class="mb-4 fw-bold">
    <a href="{{ url_for('usuarios.index') }}" class="text-decoration-none text-muted"><i class="fas fa-arrow-left"></i></a>
    {% if usuario %}Editar Usuário{% else %}Novo Usuário{% endif %}
</h2>

<div class="card shadow-sm">
    <div class="card-body p-4">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-medium">Nome Completo *</label>
                <input type="text" name="nome" class="form-control" required value="{{ usuario.nome if usuario else '' }}">
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-medium">Login de Acesso *</label>
                    <input type="text" name="usuario" class="form-control" required value="{{ usuario.usuario if usuario else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-medium">Nível de Acesso *</label>
                    <select name="tipo" class="form-select" required>
                        <option value="comum" {% if usuario and usuario.tipo == 'comum' %}selected{% endif %}>Comum</option>
                        <option value="admin" {% if usuario and usuario.tipo == 'admin' %}selected{% endif %}>Administrador</option>
                    </select>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-medium">{% if usuario %}Nova Senha (deixe em branco para manter){% else %}Senha *{% endif %}</label>
                <input type="password" name="senha" class="form-control" {% if not usuario %}required{% endif %}>
            </div>
            
            <div class="d-flex justify-content-end gap-2">
                <a href="{{ url_for('usuarios.index') }}" class="btn btn-light border">Cancelar</a>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar Usuário</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
